services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: traveloop
      POSTGRES_PASSWORD: traveloop
      POSTGRES_DB: traveloop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
